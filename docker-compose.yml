services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    shm_size: '2gb'
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c max_connections=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c timescaledb.telemetry_level=off
      -c max_locks_per_transaction=256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./eda_output:/app/eda_output:ro
    # Senza --reload: con volume Windows→Docker, watchfiles/uvicorn può andare in ENOMEM (os error 12).
    # Hot reload: uvicorn in locale o override compose con --reload.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      # Avoid mounting host .next into Linux (stale Turbopack manifest → 404 on new routes).
      - frontend_next_cache:/app/.next
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Turbopack richiede più memoria su Windows volume mounts
      - NODE_OPTIONS=--max-old-space-size=8192
    deploy:
      resources:
        limits:
          memory: 8g

volumes:
  postgres_data:
  frontend_next_cache:
